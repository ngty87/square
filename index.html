<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>四角に切れ🧩 - 長押し消去対応版</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #fdfcf0; margin: 0; touch-action: manipulation; }
        .header { margin: 15px; text-align: center; }
        #game-container { position: relative; background: white; padding: 0; border: 5px solid white; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); touch-action: none; }
        .grid { display: grid; border: 2px solid #2c3e50; }
        .cell { width: 9vw; height: 9vw; max-width: 40px; max-height: 40px; border: 0.5px solid #eee; box-sizing: border-box; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .rect { position: absolute; border: 3px solid #3498db; background: rgba(52, 152, 219, 0.2); z-index: 2; box-sizing: border-box; border-radius: 4px; pointer-events: auto; }
        .rect.valid { border-color: #27ae60; background: rgba(39, 174, 96, 0.3); }
        .answer-rect { position: absolute; border: 2px dotted #ff4757; background: transparent; z-index: 1; pointer-events: none; box-sizing: border-box; }
        .controls { margin: 15px; display: flex; gap: 10px; }
        button { padding: 12px 24px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px; font-size: 1rem; font-weight: bold; }
        button.secondary { background: #7f8c8d; }
    </style>
</head>
<body>

<div class="header">
    <h2>四角に切れ🧩</h2>
    <p style="font-size: 0.8rem; margin: 0;">2, 4, 6, 8, 12のかけ算練習</p>
    <p style="font-size: 0.7rem; color: #666;">※枠を消すときは「長押し」してね</p>
</div>

<div class="controls">
    <button onclick="resetGame()">新しくつくる</button>
    <button class="secondary" onclick="toggleAnswer()">正解表示</button>
</div>

<div id="game-container">
    <div id="grid" class="grid"></div>
    <div id="rects-layer"></div>
    <div id="answer-layer"></div>
</div>

<script>
const BOARD_SIZE = 10;
let CELL_SIZE = 0;
let rawData = [], puzzleData = [], isDragging = false, startCell = null, currentRect = null, showAnswer = false;
let pressTimer = null; // 長押し判定用

function generatePuzzle() {
    for (let attempt = 0; attempt < 1000; attempt++) {
        const board = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(false));
        const data = [];
        const targetAreas = [12, 12, 12, 8, 8, 8, 6, 6, 6, 4, 4, 4, 4, 2, 2, 2].sort(() => Math.random() - 0.5);
        let success = true;
        for (let area of targetAreas) {
            let placed = false;
            searchLoop:
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c]) continue;
                    let shapes = [];
                    for (let h = 1; h <= area; h++) {
                        if (area % h === 0) {
                            let w = area / h;
                            if (h > 6 || w > 6) continue;
                            if (r + h <= BOARD_SIZE && c + w <= BOARD_SIZE) {
                                let fit = true;
                                for (let i = 0; i < h; i++) for (let j = 0; j < w; j++) if (board[r+i][c+j]) fit = false;
                                if (fit) shapes.push({h, w});
                            }
                        }
                    }
                    if (shapes.length > 0) {
                        const s = shapes[Math.floor(Math.random() * shapes.length)];
                        for (let i = 0; i < s.h; i++) for (let j = 0; j < s.w; j++) board[r+i][c+j] = true;
                        data.push({r, c, h: s.h, w: s.w, area: area});
                        placed = true; break searchLoop;
                    }
                }
            }
            if (!placed) { success = false; break; }
        }
        if (success) {
            rawData = data;
            return data.map(d => [d.r + Math.floor((d.h-1)/2), d.c + Math.floor((d.w-1)/2), d.area]);
        }
    }
}

function init() {
    puzzleData = generatePuzzle();
    const grid = document.getElementById('grid');
    grid.style.gridTemplateColumns = `repeat(${BOARD_SIZE}, 1fr)`;
    grid.innerHTML = '';
    document.getElementById('rects-layer').innerHTML = '';
    document.getElementById('answer-layer').innerHTML = '';
    showAnswer = false;
    for (let r = 0; r < BOARD_SIZE; r++) {
        for (let c = 0; c < BOARD_SIZE; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const t = puzzleData.find(d => d[0] === r && d[1] === c);
            if (t) cell.textContent = t[2];
            grid.appendChild(cell);
        }
    }
    CELL_SIZE = document.querySelector('.cell').offsetWidth;
}

function getCell(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const gridRect = document.getElementById('grid').getBoundingClientRect();
    const c = Math.floor((clientX - gridRect.left) / CELL_SIZE);
    const r = Math.floor((clientY - gridRect.top) / CELL_SIZE);
    if (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE) return { r, c };
    return null;
}

const container = document.getElementById('game-container');

// --- 共通操作（マウス＆タッチ） ---
function handleDown(e) {
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    const el = document.elementFromPoint(clientX, clientY);

    // 長押し判定：枠の上なら500ms後に消去
    if (el && el.classList.contains('rect')) {
        pressTimer = setTimeout(() => {
            el.remove();
            checkWin();
            isDragging = false;
            if (navigator.vibrate) navigator.vibrate(50);
        }, 500);
        return;
    }

    const pos = getCell(e);
    if (pos) {
        isDragging = true; startCell = { r: pos.r, c: pos.c };
        currentRect = document.createElement('div');
        currentRect.className = 'rect';
        document.getElementById('rects-layer').appendChild(currentRect);
        drawRect(currentRect, pos.r, pos.c, pos.r, pos.c);
    }
}

function handleMove(e) {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (isDragging) {
        const pos = getCell(e);
        if (pos) drawRect(currentRect, startCell.r, startCell.c, pos.r, pos.c);
    }
}

function handleUp() {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
    if (isDragging) {
        const b = JSON.parse(currentRect.dataset.bounds);
        const area = (b.maxR - b.minR + 1) * (b.maxC - b.minC + 1);
        const nums = puzzleData.filter(d => d[0] >= b.minR && d[0] <= b.maxR && d[1] >= b.minC && d[1] <= b.maxC);
        if (nums.length === 1 && nums[0][2] === area) {
            currentRect.classList.add('valid');
            checkWin();
        } else { currentRect.remove(); }
        isDragging = false;
    }
}

// イベント登録
container.addEventListener('touchstart', (e) => { handleDown(e); e.preventDefault(); }, {passive:false});
container.addEventListener('touchmove', (e) => { handleMove(e); e.preventDefault(); }, {passive:false});
container.addEventListener('touchend', (e) => { handleUp(); e.preventDefault(); }, {passive:false});

container.onmousedown = (e) => handleDown(e);
window.onmousemove = (e) => handleMove(e);
window.onmouseup = () => handleUp();

function drawRect(el, r1, c1, r2, c2) {
    const minR = Math.min(r1, r2), maxR = Math.max(r1, r2);
    const minC = Math.min(c1, c2), maxC = Math.max(c1, c2);
    el.style.top = (minR * CELL_SIZE + 2) + 'px';
    el.style.left = (minC * CELL_SIZE + 2) + 'px';
    el.style.height = ((maxR - minR + 1) * CELL_SIZE) + 'px';
    el.style.width = ((maxC - minC + 1) * CELL_SIZE) + 'px';
    el.dataset.bounds = JSON.stringify({minR, maxR, minC, maxC});
}

function checkWin() {
    const active = document.querySelectorAll('.rect.valid');
    let total = 0;
    active.forEach(r => {
        const b = JSON.parse(r.dataset.bounds);
        total += (b.maxR - b.minR + 1) * (b.maxC - b.minC + 1);
    });
    if (total === 100) setTimeout(() => alert('全問正解！'), 100);
}

function toggleAnswer() {
    const layer = document.getElementById('answer-layer');
    if (!showAnswer) {
        rawData.forEach(d => {
            const el = document.createElement('div');
            el.className = 'answer-rect';
            el.style.top = (d.r * CELL_SIZE + 2) + 'px';
            el.style.left = (d.c * CELL_SIZE + 2) + 'px';
            el.style.height = (d.h * CELL_SIZE) + 'px';
            el.style.width = (d.w * CELL_SIZE) + 'px';
            layer.appendChild(el);
        });
        showAnswer = true;
    } else { layer.innerHTML = ''; showAnswer = false; }
}

function resetGame() { init(); }
init();
</script>
</body>
</html>
